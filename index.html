<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulse.exe</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #06000f;
      --card: #13092e;
      --accent1: #ff2df7;
      --accent2: #00f0ff;
      --accent3: #aaff00;
      --text: #f0e6ff;
      --muted: #7a6a99;
      --glow1: rgba(255,45,247,0.35);
      --glow2: rgba(0,240,255,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob1 { width:500px; height:500px; background:var(--glow1); top:-150px; left:-100px; animation:drift1 12s ease-in-out infinite alternate; }
    .blob2 { width:400px; height:400px; background:var(--glow2); bottom:-100px; right:-80px; animation:drift2 15s ease-in-out infinite alternate; }
    .blob3 { width:300px; height:300px; background:rgba(170,255,0,0.12); top:40%; left:40%; animation:drift1 18s ease-in-out infinite alternate-reverse; }
    @keyframes drift1 { from{transform:translate(0,0) scale(1)} to{transform:translate(40px,30px) scale(1.1)} }
    @keyframes drift2 { from{transform:translate(0,0) scale(1)} to{transform:translate(-30px,-40px) scale(1.15)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .container {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeUp 0.8s ease both;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--accent1) 0%, var(--accent2) 60%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }
    .artist {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cover-wrap {
      position: relative;
      width: 260px;
      margin: 0 auto 50px;
      animation: fadeUp 0.9s 0.15s ease both;
    }
    .cover-spin {
      position: absolute;
      inset: -4px;
      border-radius: 14px;
      background: conic-gradient(from 0deg, var(--accent1), var(--accent2), var(--accent3), var(--accent1));
      opacity: 0;
      z-index: -1;
      transition: opacity 0.4s;
    }
    .playing .cover-spin { opacity: 1; animation: spinBorder 3s linear infinite; }
    @keyframes spinBorder { to{transform:rotate(360deg)} }
    .cover {
      width: 260px;
      height: 260px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1a0535 0%, #0d1a40 50%, #001a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 0 60px var(--glow1), 0 0 30px var(--glow2);
      position: relative;
      overflow: hidden;
    }
    .cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,45,247,0.1), transparent 60%);
    }
    .like-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s;
      z-index: 2;
      backdrop-filter: blur(8px);
      color: var(--muted);
    }
    .like-btn:hover { transform: scale(1.15); }
    .like-btn.liked { animation: likePop 0.4s ease; }
    @keyframes likePop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
    .like-count {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .like-count span { color: var(--accent1); font-weight: 700; }

    .player-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
      animation: fadeUp 1s 0.25s ease both;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .waveform {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
      margin-bottom: 16px;
      justify-content: center;
    }
    .waveform-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--muted);
    }
    .playing .waveform-bar {
      background: var(--accent1);
      animation: wave var(--dur, 0.8s) ease-in-out infinite alternate;
    }
    @keyframes wave { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }
    .audio-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px var(--glow1);
    }
    .play-btn:hover { transform: scale(1.08); }
    .progress-wrap { flex: 1; }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
      position: relative;
      transition: width 0.1s linear;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 6px var(--accent1);
    }
    .volume-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s;
    }
    .volume-btn:hover { color: var(--accent2); }
    audio { display: none; }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--accent3);
      color: var(--accent3);
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      text-decoration: none;
      text-transform: uppercase;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      margin-bottom: 24px;
      animation: fadeUp 1s 0.35s ease both;
    }
    .download-btn:hover {
      background: rgba(170,255,0,0.08);
      box-shadow: 0 0 20px rgba(170,255,0,0.2);
      transform: translateY(-2px);
    }

    .lyrics-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      animation: fadeUp 1s 0.45s ease both;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .section-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 20px;
      opacity: 0.7;
    }
    .lyrics {
      font-size: 14px;
      line-height: 2;
      color: rgba(240,230,255,0.75);
    }
    footer {
      text-align: center;
      margin-top: 50px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeUp 1s 0.65s ease both;
    }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">

  <header>
    <h1>Pulse.exe</h1>
    <p class="artist">Pixo</p>
  </header>

  <div class="cover-wrap" id="cover-wrap">
    <div class="cover-spin"></div>
    <div class="cover">
      🎧
      <button class="like-btn" id="like-btn">&#9825;</button>
    </div>
    <p class="like-count"><span id="like-num">2</span> likes</p>
  </div>

  <div class="player-card" id="player-card">
    <div class="waveform" id="waveform"></div>
    <div class="audio-controls">
      <button class="play-btn" id="play-btn">&#9654;</button>
      <div class="progress-wrap">
        <div class="time-row">
          <span id="current-time">0:00</span>
          <span id="duration">0:00</span>
        </div>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <button class="volume-btn" id="vol-btn">&#9834;</button>
    </div>
    <audio id="audio-player" src="https://res.cloudinary.com/dhjtu3rpo/video/upload/v1773193614/song_nodl2b.mp3"></audio>
  </div>

  <button class="download-btn" id="download-btn">
    &#8595; Download Track
  </button>

  <div class="lyrics-card">
    <p class="section-label">// Lyrics</p>
    <div class="lyrics">
      <span style="color:var(--muted); font-size:13px; letter-spacing:1px;">— no lyrics for this one. just feel it.</span>
    </div>
  </div>

  <footer>
    <p>&#169; 2026 Pixo &#8212; All rights reserved</p>
  </footer>

</div>

<script>
  // WAVEFORM
  var waveform = document.getElementById('waveform');
  for (var i = 0; i < 40; i++) {
    var bar = document.createElement('div');
    bar.className = 'waveform-bar';
    bar.style.height = (10 + Math.random() * 90) + '%';
    bar.style.setProperty('--dur', (0.5 + Math.random() * 0.7).toFixed(2) + 's');
    bar.style.animationDelay = (Math.random() * 0.5).toFixed(2) + 's';
    waveform.appendChild(bar);
  }

  // PLAYER
  var audio       = document.getElementById('audio-player');
  var playBtn     = document.getElementById('play-btn');
  var progressBar = document.getElementById('progress-bar');
  var fill        = document.getElementById('progress-fill');
  var curTime     = document.getElementById('current-time');
  var durEl       = document.getElementById('duration');
  var playerCard  = document.getElementById('player-card');
  var coverWrap   = document.getElementById('cover-wrap');
  var volBtn      = document.getElementById('vol-btn');
  var isPlaying   = false;

  function fmt(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  audio.addEventListener('loadedmetadata', function() {
    durEl.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', function() {
    if (!audio.duration) return;
    fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    curTime.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', function() { setPlaying(false); });

  playBtn.addEventListener('click', function() {
    if (isPlaying) { audio.pause(); setPlaying(false); }
    else { audio.play(); setPlaying(true); }
  });

  progressBar.addEventListener('click', function(e) {
    if (!audio.duration) return;
    var rect = progressBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  volBtn.addEventListener('click', function() {
    audio.muted = !audio.muted;
    volBtn.innerHTML = audio.muted ? '&#10006;' : '&#9834;';
  });

  function setPlaying(state) {
    isPlaying = state;
    playBtn.innerHTML = state ? '&#9646;&#9646;' : '&#9654;';
    if (state) {
      playerCard.classList.add('playing');
      coverWrap.classList.add('playing');
    } else {
      playerCard.classList.remove('playing');
      coverWrap.classList.remove('playing');
    }
  }

  // DOWNLOAD
  document.getElementById('download-btn').addEventListener('click', function() {
    var btn = document.getElementById('download-btn');
    btn.textContent = 'Downloading...';
    fetch('https://res.cloudinary.com/dhjtu3rpo/video/upload/v1773193614/song_nodl2b.mp3')
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'Pulse.exe - Pixo.mp3';
        a.click();
        URL.revokeObjectURL(url);
        btn.innerHTML = '&#8595; Download Track';
      });
  });
  var likeBtn = document.getElementById('like-btn');
  var likeNum = document.getElementById('like-num');
  var liked = false;
  var likes = 2;

  likeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    liked = !liked;
    likes += liked ? 1 : -1;
    likeBtn.innerHTML = liked ? '<span style="color:#ff2df7">&#9829;</span>' : '&#9825;';
    likeNum.textContent = likes;
    likeBtn.classList.toggle('liked', liked);
  });
</script>
</body>
</html>
